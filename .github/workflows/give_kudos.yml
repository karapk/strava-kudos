name: Give Strava Kudos

on:
  schedule:
    - cron: "30 5-23/6 * * *"
  workflow_dispatch:

env:
  # Saved Strava session (cookies + localStorage), captured locally via
  # save_session.py. Set this repo secret to the full contents of
  # strava_state.json. Login is NOT automated — Strava blocks it.
  STRAVA_STATE_JSON: ${{ secrets.STRAVA_STATE_JSON }}

jobs:
  run-kudos-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install firefox --with-deps
      - run: python give_kudos.py
      - name: Upload error screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error.png
          if-no-files-found: ignore
