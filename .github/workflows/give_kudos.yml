name: Give Strava Kudos

on:
  schedule:
    # 09:00, 14:00, 18:00, 21:00 US Central (CDT, UTC-5) — peak time for
    # completed activities. GitHub cron is UTC and does NOT observe DST, so in
    # winter (CST, UTC-6) these land one hour earlier locally; retune if needed.
    - cron: "0 2,14,19,23 * * *"
  workflow_dispatch:

env:
  # Saved Strava session (cookies + localStorage), captured locally via
  # save_session.py. Set this repo secret to the full contents of
  # strava_state.json. Login is NOT automated — Strava blocks it.
  STRAVA_STATE_JSON: ${{ secrets.STRAVA_STATE_JSON }}

jobs:
  run-kudos-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: playwright install firefox --with-deps
      - run: python give_kudos.py
      # No error.png artifact upload: this repo is public, so an uploaded
      # failure screenshot of the logged-in feed would be world-downloadable.
      # give_kudos.py still writes error.png locally for debugging; in CI,
      # diagnose failures from the (credential-free) Actions logs instead.
